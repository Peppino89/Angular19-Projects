<div class="transaction-stats">
  <h1>Statistiche:</h1>

  <div class="stat-card income">
    <h3>Entrate</h3>
    <p>+{{ totalIncome }}</p>
  </div>

  <div class="stat-card expense">
    <h3>Uscite</h3>
    <p>-{{ totalExpense }}</p>
  </div>

  <div class="stat-card balance">
    <h3>Saldo</h3>
    <p>{{ balance }}</p>
  </div>
</div>
