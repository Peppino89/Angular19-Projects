<h1>Notes App</h1>
<app-note-form (noteAdded)="onNoteAdded($event)"></app-note-form>
<app-note-filter
  (searchChanged)="onSearchChanged($event)"
  (categoryChanged)="onCategoryChanged($event)">

</app-note-filter>
<p>Totale note: {{ totalNotes }}</p>
<p>Preferite:  {{ favoriteNotesCount }}</p>

<app-note-list [notes]="filteredNotes"
               (deleteNote)="onDeleteNote($event)"
               (toggleFavorite)="onToggleFavorite($event)"
               (updateNote)="onUpdateNote($event)"
></app-note-list>
